name: Deploy TNP Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]   # CI checks on PRs — no deployment runs

env:
  AWS_REGION: ap-south-1

jobs:
  # ─── CI — Build check (runs on every push + PR) ───────────────────────────────
  ci:
    name: CI — Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build React app
        # .env.production is committed to the repo and Vite loads it automatically
        # during `vite build` — no env injection needed here
        run: cd frontend && npm run build

  # ─── Backend ─────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            REPO_DIR="/home/ec2-user/tnp"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            echo "── Clone or pull repo"
            if [ -d "$REPO_DIR/.git" ]; then
              echo "   Repo exists — syncing to latest commit"
              git -C "$REPO_DIR" fetch --prune
              git -C "$REPO_DIR" reset --hard origin/main
            else
              echo "   Repo missing — cloning fresh"
              rm -rf "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            echo "── Writing backend production env"
            cat > "$REPO_DIR/backend/.env" << ENVEOF
            NODE_ENV=production
            PORT=5000
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DB_SSL=${{ secrets.DB_SSL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
            AWS_REGION=${{ env.AWS_REGION }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            SES_AWS_ACCESS_KEY_ID=${{ secrets.SES_AWS_ACCESS_KEY_ID }}
            SES_AWS_SECRET_ACCESS_KEY=${{ secrets.SES_AWS_SECRET_ACCESS_KEY }}
            SES_FROM_EMAIL=${{ secrets.SES_FROM_EMAIL }}
            SES_CONFIGURATION_SET=${{ secrets.SES_CONFIGURATION_SET }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            DISABLE_CRON=false
            ENVEOF

            # Strip leading whitespace from each line (heredoc indentation)
            sed -i 's/^[[:space:]]*//' "$REPO_DIR/backend/.env"

            echo "── Installing backend dependencies"
            cd "$REPO_DIR/backend"
            npm ci --omit=dev

            echo "── Running migrations"
            npm run migrate

            echo "── Seed database (first deploy only)"
            USER_COUNT=$(node -e "
              const pool = require('./src/db/pool');
              pool.query('SELECT COUNT(*) AS c FROM users')
                .then(r => { process.stdout.write(String(r.rows[0].c)); pool.end(); })
                .catch(() => { process.stdout.write('0'); pool.end(); });
            ")
            if [ "$USER_COUNT" = "0" ]; then
              echo "   Empty database — running seed"
              node src/db/seed.js
            else
              echo "   Database already has $USER_COUNT user(s) — skipping seed"
            fi

            echo "── Copying Nginx config"
            sudo cp "$REPO_DIR/nginx/tnp.conf" /etc/nginx/conf.d/tnp.conf
            sudo nginx -t && sudo systemctl reload nginx

            echo "── Starting / reloading PM2 (zero-downtime)"
            mkdir -p /home/ec2-user/logs
            cd "$REPO_DIR/backend"
            if pm2 describe tnp-backend > /dev/null 2>&1; then
              pm2 reload tnp-backend --update-env
            else
              pm2 start ecosystem.config.js --update-env
            fi
            pm2 save

            echo "── Health check"
            for attempt in $(seq 1 15); do
              if curl -sf http://127.0.0.1:5000/health; then
                echo
                echo "✅ Backend health check passed (attempt $attempt)"
                break
              fi

              if [ "$attempt" -eq 15 ]; then
                echo "❌ Health check FAILED after 15 attempts"
                pm2 logs tnp-backend --lines 50 || true
                exit 1
              fi

              echo "   Waiting for backend... (attempt $attempt/15)"
              sleep 5
            done

            echo "✅ Backend deployed successfully"

  # ─── Frontend ────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend → S3 + CloudFront
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build React app
        # Vite automatically loads frontend/.env.production during `vite build`.
        # VITE_API_BASE_URL is defined there — no secret injection required.
        run: cd frontend && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          FRONTEND_BUCKET="${{ secrets.S3_FRONTEND_BUCKET }}"
          # Strip protocol/path if someone accidentally pasted a URL
          FRONTEND_BUCKET="${FRONTEND_BUCKET#http://}"
          FRONTEND_BUCKET="${FRONTEND_BUCKET#https://}"
          FRONTEND_BUCKET="${FRONTEND_BUCKET%%/*}"

          if [ -z "$FRONTEND_BUCKET" ]; then
            echo "❌ S3_FRONTEND_BUCKET secret is empty or invalid"
            exit 1
          fi

          echo "📦 Uploading frontend build to s3://$FRONTEND_BUCKET"
          aws s3 sync frontend/dist/ "s3://$FRONTEND_BUCKET/" \
            --delete \
            --region ${{ env.AWS_REGION }}
          echo "✅ S3 upload complete"

      - name: Invalidate CloudFront cache
        run: |
          CF_DIST_ID="${{ secrets.CF_DIST_ID }}"

          if [ -z "$CF_DIST_ID" ]; then
            echo "⚠️  CF_DIST_ID not set — skipping CloudFront invalidation."
            exit 0
          fi

          case "$CF_DIST_ID" in
            http://*|https://*|*.cloudfront.net)
              echo "❌ CF_DIST_ID must be a distribution ID (e.g. E1A2B3C4D5), not a URL."
              exit 1
              ;;
          esac

          echo "🔄 Invalidating CloudFront distribution: $CF_DIST_ID"
          aws cloudfront create-invalidation \
            --distribution-id "$CF_DIST_ID" \
            --paths "/*"
          echo "✅ CloudFront invalidation triggered"

      - name: Deployment summary
        run: |
          FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
          if [ -n "$FRONTEND_URL" ]; then
            echo "✅ Frontend live at: $FRONTEND_URL"
          else
            echo "✅ Frontend deployed to S3"
          fi
