name: Deploy TNP Platform

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1

jobs:
  # ─── Backend ─────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → EC2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            REPO_DIR="/home/ec2-user/tnp"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            echo "── Clone or pull repo"
            if [ -d "$REPO_DIR/.git" ]; then
              echo "   Repo exists — pulling latest"
              git -C "$REPO_DIR" pull origin main
            else
              echo "   Repo missing — cloning fresh"
              rm -rf "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            echo "── Installing backend dependencies"
            cd "$REPO_DIR/backend"
            npm install --omit=dev

            echo "── Running migrations"
            npm run migrate

            echo "── Copying Nginx config"
            sudo cp "$REPO_DIR/nginx/tnp.conf" /etc/nginx/conf.d/tnp.conf
            sudo nginx -t && sudo systemctl reload nginx

            echo "── Starting / reloading PM2"
            if pm2 list | grep -q "tnp-backend"; then
              pm2 reload tnp-backend --update-env
            else
              cd "$REPO_DIR/backend"
              pm2 start ecosystem.config.js
              pm2 startup | tail -1 | bash || true
              pm2 save
            fi

            echo "── Health check"
            sleep 3
            curl -sf http://localhost:5000/health || (echo "Health check FAILED" && exit 1)

            echo "✅ Backend deployed"

  # ─── Frontend ────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend → S3 + CloudFront
    runs-on: ubuntu-latest
    needs: deploy-backend   # only deploy frontend after backend is healthy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build React app
        run: cd frontend && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --delete \
            --region ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Summary
        run: |
          echo "✅ Frontend deployed to https://${{ secrets.CF_DISTRIBUTION_ID }}.cloudfront.net"
